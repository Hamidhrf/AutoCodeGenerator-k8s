apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-inference
  labels:
    app: llama-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llama-inference
  template:
    metadata:
      labels:
        app: llama-inference
    spec:
      containers:
        - name: llama-infer
          image: llama-inference:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5050
          envFrom:
            - secretRef:
                name: llama-secret
          resources:
            limits:
              nvidia.com/gpu: 1
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: llama-inference
spec:
  selector:
    app: llama-inference
  ports:
    - name: http
      protocol: TCP
      port: 5050
      targetPort: 5050
      nodePort: 32501
  sessionAffinity: None
  type: NodePort

